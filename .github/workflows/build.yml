name: Build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Pin Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'
      - name: swift build（macOS）
        run: swift build
      - name: xcodebuild（iOS Simulator）
        run: xcodebuild build -scheme MicrophoneStream -destination 'generic/platform=iOS Simulator'
